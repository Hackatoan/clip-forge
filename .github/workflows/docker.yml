name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/hackatoan/clip-forge:latest

      # NOTE: no cloud "deploy" step — the homelab host isn't reachable from
      # GitHub's runners (private LAN behind the router). Deployment happens on
      # the host itself: `cd /opt/homelab/clip-forge && git pull && docker
      # compose up -d --build`. This workflow just validates the build and
      # publishes ghcr.io/hackatoan/clip-forge:latest.
